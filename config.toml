baseURL = 'https://ashwinsundar.com/'
languageCode = 'en-us'
title = 'Ashwin Sundar'
theme = 'ashwin'
enableEmoji = 'true'
enableRobotsTXT = 'true'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true 
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]
[params]
  math = true
[outputs]
    home = ["HTML", "RSS"]
    page = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "rss"
    isPlainText = false
    rel = "alternate"
    isHTML = false
    noUgly = true
    permalinkable = false
